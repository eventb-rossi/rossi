version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/editors/vscode"
    schedule:
      interval: "weekly"
    ignore:
      # @types/vscode must match engines.vscode (the minimum supported VS Code
      # version), not track latest, or `vsce package` fails. Bump it manually
      # alongside engines.vscode when raising the minimum.
      - dependency-name: "@types/vscode"
