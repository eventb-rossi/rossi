name: Zed Extension

on:
  push:
    branches: [main]
    paths:
      - 'editors/zed/**'
      - '.github/workflows/zed.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/zed/**'
      - '.github/workflows/zed.yml'

permissions:
  contents: read

jobs:
  zed:
    name: Build extension (wasm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # The extension is a wasm cdylib (excluded from the workspace); building it
      # validates src/lib.rs against zed_extension_api and the committed Cargo.lock.
      - name: Add wasm target
        run: rustup target add wasm32-wasip1

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: editors/zed

      # The tree-sitter grammar now lives in the standalone tree-sitter-eventb
      # repository, which has its own CI for `tree-sitter generate`/`test`. The
      # main CI's `cargo xtask gen-grammars --check` still guards that its generated regions
      # match the token tables. Here we only build the wasm extension.
      - name: Build extension (wasm)
        run: cargo build --locked --target wasm32-wasip1
        working-directory: editors/zed
