name: release-plz

on:
  # Gate publishing on CI passing: only fire when the CI workflow completes
  # successfully on main. A bare `push` would race with CI (both start on the
  # same commit); workflow_run ensures tests finish first.
  workflow_run:
    workflows: ["CI"] # must match name: in ci.yml exactly
    types: [completed]
    branches: [main]  # excludes tag pushes and PR runs; never fires twice on the same commit
  # Refresh the preview Release PR on a daily schedule and on demand, rather than
  # on every merge — see the release-plz-pr job comment.
  schedule:
    - cron: "17 5 * * *" # daily, UTC; off-the-hour per GitHub's scheduling guidance
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Open/update the "Release vX.Y.Z" PR (version bump + changelog). The PR is just a
  # preview, so refresh it on the daily schedule / manual dispatch rather than on
  # every merge to main (each refresh is a runner job; this skips it per-merge).
  # Runs under the VERSION_BUMP_TOKEN PAT so the PR's own CI checks fire (the default
  # GITHUB_TOKEN cannot trigger workflows on the PR it opens).
  release-plz-pr:
    name: Release PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: true # a burst of refreshes collapses to the newest run
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}

  # When a release commit lands on main, publish the crates and create the single
  # tag + GitHub release. Publishing uses crates.io Trusted Publishing (OIDC): no
  # CARGO_REGISTRY_TOKEN secret — release-plz mints a short-lived token via the
  # id-token permission below. The release is created under VERSION_BUMP_TOKEN (a
  # PAT), not the default GITHUB_TOKEN: GitHub does not let events created by the
  # default token trigger further workflows, and the prebuilt-binary workflow
  # (release.yml) must fire on the published release.
  release-plz-release:
    name: Release
    # Publish only when CI passes on main; never on schedule/dispatch.
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Serialize releases: a burst of CI completions on main (a re-run, or rapid
    # merges) would otherwise spawn parallel release jobs. Never cancel in
    # progress — a half-finished publish must run to completion.
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    permissions:
      contents: write # push the tag, create the GitHub release
      pull-requests: write # comment on / label the released PR
      id-token: write # OIDC -> crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          # Check out the BRANCH, not a SHA: release-plz resolves the current
          # branch via @{upstream}, so HEAD must point to a branch (a detached
          # SHA fails with "HEAD does not point to a branch"). The branches filter
          # guarantees head_branch is main; its tip is the merged release commit
          # CI just validated.
          ref: ${{ github.event.workflow_run.head_branch }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
