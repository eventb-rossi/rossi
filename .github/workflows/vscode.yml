name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode.yml'

permissions:
  contents: read

jobs:
  vscode:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test symbol matcher
        run: npm run test:matcher

      - name: Package VSIX
        run: npm run package -- --out /tmp/event-b.vsix

      - name: Verify packaged VSIX
        run: npm run check:vsix -- /tmp/event-b.vsix
