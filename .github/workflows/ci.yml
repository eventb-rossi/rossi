name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE*'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE*'

# Cancel superseded in-progress runs on the same PR; never cancel main or tag
# (release) runs — cancel-in-progress is false for push events.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # The tree-sitter-eventb grammar is a submodule; `cargo xtask
          # gen-grammars --check` and the gen_grammars test read its grammar.js
          # / queries.
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check LSP type dependency alignment
        run: |
          set -euo pipefail
          output="$(cargo tree -i lsp-types 2>&1)" || {
            printf '%s\n' "$output"
            echo "Expected exactly one lsp-types version; use eventb-lsp's crate::lsp_types re-export so protocol types match tower-lsp." >&2
            exit 1
          }
          printf '%s\n' "$output"
          count="$(printf '%s\n' "$output" | grep -c '^lsp-types v')"
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly one lsp-types version; use eventb-lsp's crate::lsp_types re-export so protocol types match tower-lsp." >&2
            exit 1
          fi

      - name: Check editor grammars are up to date
        run: cargo xtask gen-grammars --check

      - name: Run tests
        run: cargo test --verbose

      - name: Run tests with serde feature
        run: cargo test --verbose --features serde

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        run: cargo doc --workspace --no-deps --document-private-items --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (no features)
        run: cargo build --verbose

      - name: Build (all features)
        run: cargo build --verbose --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Tarpaulin runs the same tests as the test job, which read the
          # tree-sitter-eventb submodule (cargo xtask gen-grammars --check, grammar.js).
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false
