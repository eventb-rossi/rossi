name = "Event-B"
grammar = "eventb"
path_suffixes = ["eventb"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
tab_size = 4
# Characters the cursor may sit immediately before and still trigger bracket
# auto-close (string/comment suppression lives on the `"` bracket's `not_in`).
autoclose_before = ";:.,=}])>"

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "("
end = ")"
close = true
newline = true

# Don't auto-close a second `"` when the cursor is already inside a string or comment.
[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string", "comment"]
