id = "eventb"
name = "Event-B (Rossi)"
version = "0.1.0"
schema_version = 1
authors = ["Rossi Contributors"]
description = "Event-B language support (Rossi): rossi-language-server over LSP plus tree-sitter syntax highlighting."
repository = "https://github.com/eventb-rossi/rossi"

# The tree-sitter grammar. Zed fetches grammars from a git repository at a
# pinned revision (there is no local-path option). The grammar is the standalone
# `eventb-rossi/tree-sitter-eventb` repository, developed in this monorepo as
# the `editors/tree-sitter-eventb/` submodule and kept in sync with the
# canonical token tables by `rossi gen-grammars`. `rev` pins the submodule's
# commit; until the repository is published, see editors/zed/INSTALL.md for the
# local-development `file://` workflow.
[grammars.eventb]
repository = "https://github.com/eventb-rossi/tree-sitter-eventb"
rev = "465d62af637dd0b95da4dce736c735f59e26347d"

[language_servers.rossi-language-server]
name = "Rossi Event-B Language Server"
languages = ["Event-B"]
